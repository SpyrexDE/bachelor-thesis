# Illustrative fixture for the study, not official Henkel copy (docs/decisions.md D8).
id: schwarzkopf
brand: Schwarzkopf
product: Gliss Ultimate Repair shampoo and treatment
problem: >-
  Frequent heat styling visibly damages hair, but repair products are met with
  scepticism because past promises did not show results.
objectives: >-
  Position Gliss Ultimate Repair as visible repair after the first wash and get
  the audience to try it once.
audience: >-
  Style-focused women and men, 20 to 35, who use heat tools weekly, follow hair
  content on social media, and switch brands readily.
insight: >-
  They will not give up heat styling; they want to style guilt-free because the
  damage is being repaired as fast as it is made.
key_benefit: Visibly repaired hair after one use.
reason_to_believe: >-
  Liquid keratin complex rebuilds the hair surface; up to 90 percent less
  breakage in instrumental tests after combined use of shampoo and treatment.
tone: Premium, energetic, glossy; beauty-editorial rather than clinical.
deliverables: >-
  One coherent campaign across an Instagram post (4:5 image), a
  vertical story key visual (9:16), and a 300x250 display banner.
success_measures: >-
  Trial intent in campaign surveys and engagement rate on the social placements,
  tied to the trial objective.
mandatories:
  required_claims:
    - 90 percent less breakage
  prohibited_wording:
    - permanent repair
    - heals
    - damage-proof
