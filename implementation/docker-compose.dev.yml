# Development override: source and briefs mounted live, uvicorn reloads on
# Python changes, UI files serve straight from the working tree.
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  grain:
    command: uvicorn --factory grain.api.app:create_app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    environment:
      GRAIN_PROVIDER: mock
      # /app/src precedes the baked site-packages copy on the import path.
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
      - ./briefs:/app/briefs
      - ./data:/data
